<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>徹底 N1</title>
    
    <!-- SỬA LỖI HIỂN THỊ VÀ CẤU HÌNH PWA CHUẨN TRÊN ĐIỆN THOẠI -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="N1 Flashcard">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        /* BẢNG MÀU CHUẨN PASTEL THEO ẢNH THIẾT KẾ OCEAN BLUE */
        :root[data-theme="light"] {
            --bg-color: #F0F7FF;
            --card-bg: #F0FFFF;
            --primary: #7BB3FF;
            --secondary: #A8D5FF;
            --accent: #FFD6A5;
            --success: #A7E3C2;
            --warning: #FFE08A;
            --error: #FFB3B3;
            --text-color: #1E3A8A;
            --text-muted: #947A88;
            --border-color: #D6E4F7;
            --blur-bg: #E0F2F1;
            --option-bg: #FFFFFF;
            --option-text: #1E3A8A;
            --highlight-bg: rgba(255, 214, 165, 0.6);
            --highlight-text: #1E3A8A;
        }

        :root[data-theme="dark"] {
            --bg-color: #0E1A2B;
            --card-bg: #1B2B3A;
            --primary: #7FB8FF;
            --secondary: #9CC8FF;
            --accent: #FFD6A5;
            --success: #7BD4A3;
            --warning: #FFC16A;
            --error: #E681FF;
            --text-color: #E6F1FF;
            --text-muted: #A3B1C6;
            --border-color: #23324A;
            --blur-bg: #1B2B3A;
            --option-bg: #1B2B3A;
            --option-text: #E6F1FF;
            --highlight-bg: rgba(255, 214, 165, 0.3);
            --highlight-text: #FFD6A5;
        }

        body {
            font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        .header-row {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 430px;
            margin-bottom: 12px;
            margin-top: calc(env(safe-area-inset-top) + 4px);
        }
        h1.title { font-size: 22px; margin: 0; color: var(--text-color); font-weight: bold; text-align: center; }
        
        .theme-toggle-btn {
            position: absolute;
            background: transparent;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            user-select: none;
            transition: color 0.2s;
        }
        #theme-toggle { right: 0; }
        #offline-toggle { right: 38px; font-size: 19px;}
        #color-custom-toggle { right: 76px; font-size: 19px; } /* Vị trí ô đỏ yêu cầu */

        .container { 
            width: 100%; 
            max-width: 430px; 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-bottom: calc(env(safe-area-inset-bottom) + 10px);
            overflow: hidden;
        }

        .controls-row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            gap: 10px; 
            background-color: var(--card-bg);
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
        }
        .select-wrapper { display: flex; align-items: center; gap: 6px; flex: 1; }
        .select-wrapper label { font-size: 13px; font-weight: bold; color: var(--text-muted); white-space: nowrap; }
        select { width: 100%; background-color: transparent; color: var(--text-color); border: none; padding: 4px 0; font-size: 14px; outline: none; font-weight: 600; cursor: pointer; }
        select option { background-color: var(--option-bg); color: var(--option-text); }

        .file-input-label {
            display: inline-flex;
            align-items: center;
            background-color: transparent;
            color: var(--text-color);
            border: 1.5px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .file-input-label:hover { background-color: var(--border-color); }
        #excel-file { display: none; }

        .bookmark-filter { display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; color: var(--text-muted); margin: -2px 0; cursor: pointer; font-weight: 500; }

        .mode-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .mode-btn { background-color: transparent; color: var(--text-muted); border: 1.5px solid var(--border-color); padding: 12px 2px; border-radius: 12px; font-size: 13px; cursor: pointer; font-weight: 600; text-align: center; transition: all 0.2s;}
        .mode-btn.active { background-color: var(--primary); color: var(--bg-color); border-color: var(--border-color); }

        .tab-content { display: none; flex-direction: column; width: 100%; flex: 1; overflow: hidden; }

        /* CARD STYLE */
        .flashcard { width: 100%; height: 320px; perspective: 1000px; margin: 4px 0; cursor: pointer; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.4s; transform-style: preserve-3d; -webkit-transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); -webkit-transform: rotateY(180deg); }
        
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; -webkit-backface-visibility: hidden; border-radius: 20px; padding: 25px 20px; box-sizing: border-box; background-color: var(--card-bg); border: 1px solid var(--border-color); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .flashcard-front { display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotateY(0deg); -webkit-transform: rotateY(0deg); }
        .flashcard-back { color: var(--text-color); display: flex; flex-direction: column; align-items: center; justify-content: space-around; text-align: center; transform: rotateY(180deg); -webkit-transform: rotateY(180deg); overflow-y: auto; }
        
        .flashcard.flipped .flashcard-front { visibility: hidden; }
        .flashcard:not(.flipped) .flashcard-back { visibility: hidden; }

        .card-icon-top { position: absolute; top: 15px; font-size: 18px; cursor: pointer; z-index: 10; }
        .star-icon { left: 15px; }
        .eye-icon { right: 15px; font-size: 12px; color: var(--text-muted); font-weight: 500; }

        .word-main { font-size: 52px; font-weight: bold; margin: 0; color: var(--text-color); font-family: "Noto Sans JP", sans-serif; }
        .audio-btn { background: var(--primary); border: none; color: var(--bg-color); border-radius: 50%; width: 32px; height: 32px; font-size: 13px; cursor: pointer; margin-left: 8px; display: inline-flex; align-items: center; justify-content: center; vertical-align: middle; }

        .fb-container-top { display: flex; flex-direction: column; align-items: center; gap: 4px; width: 100%; }
        .fb-hanviet { font-size: 24px; color: var(--text-color); font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }
        .fb-kana { font-size: 18px; color: var(--text-muted); font-weight: 500; margin: 0; display: flex; align-items: center; justify-content: center; }
        .fb-mean { font-size: 21px; font-weight: bold; margin: 4px 0; color: var(--text-color); }

        .blur-box { filter: blur(6px); background: var(--blur-bg); border-radius: 6px; padding: 2px 10px; cursor: pointer; color: transparent; display: inline-block; transition: filter 0.25s; user-select: none; }
        .blur-box.revealed { filter: none; background: transparent; color: inherit; user-select: text; }

        mark.highlight-word { background-color: var(--highlight-bg); color: var(--highlight-text); font-weight: bold; padding: 0 4px; border-radius: 4px; }

        .nav-buttons { display: flex; justify-content: space-between; align-items: stretch; width: 100%; gap: 10px; margin-top: 4px; }
        .nav-btn { padding: 14px 4px; border-radius: 16px; font-weight: bold; cursor: pointer; font-size: 15px; border: 1.5px solid transparent; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        
        .nav-btn.btn-prev { flex: 1.1; background-color: transparent; color: var(--text-color); border-color: var(--border-color); }
        .nav-btn.btn-prev:active { background-color: var(--border-color); }
        
        .nav-btn.btn-secondary { flex: 0.8; background-color: var(--secondary); color: var(--text-color); border: 1px solid var(--border-color); }
        
        .nav-btn.btn-next { flex: 1.1; background-color: var(--primary); color: var(--bg-color); border: 1px solid var(--border-color); }

        .progress-container { width: 100%; display: flex; flex-direction: column; gap: 4px; margin: 2px 0; }
        .progress-bar-bg { width: 100%; height: 6px; background-color: var(--border-color); border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background-color: var(--success); transition: width 0.3s ease; }
        .progress-info { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--text-muted); }

        .difficulty-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; margin: 8px 0; }
        .diff-btn { background-color: transparent; border: 1.5px solid; padding: 10px 4px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 2px; transition: transform 0.1s, background-color 0.2s; }
        .diff-btn:active { transform: scale(0.96); }
        
        .diff-icon { font-size: 16px; margin-bottom: 2px; }

        .diff-again { color: var(--text-color); background-color: var(--error); border-color: var(--border-color); }
        .diff-hard { color: var(--text-color); background-color: var(--warning); border-color: var(--border-color); }
        .diff-good { color: var(--text-color); background-color: var(--success); border-color: var(--border-color); }
        .diff-easy { color: var(--text-color); background-color: var(--secondary); border-color: var(--border-color); }

        .diff-btn span:last-child { font-size: 11px; font-weight: normal; opacity: 0.8; color: inherit; }

        footer { display: flex; justify-content: center; gap: 15px; font-size: 13px; margin-top: auto; margin-bottom: 4px; padding-top: 8px; }
        footer a { color: var(--text-muted); text-decoration: none; font-weight: bold; cursor: pointer; }

        /* GIAO DIỆN MỤC GÕ TỪ */
        .quiz-stats-board { display: flex; justify-content: space-around; background-color: var(--card-bg); padding: 10px; border-radius: 12px; border: 1px solid var(--border-color); font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .stat-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; }
        .stat-val.correct { color: var(--text-color); padding: 2px 6px; background: var(--success); border-radius: 4px; font-size: 15px; }
        .stat-val.wrong { color: var(--text-color); padding: 2px 6px; background: var(--error); border-radius: 4px; font-size: 15px; }
        .stat-val.total { color: var(--text-color); font-size: 15px; }

        .quiz-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; flex: 1; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .quiz-question { font-size: 56px; font-weight: bold; text-align: center; color: var(--text-color); margin: 0; font-family: "Klee One", "UD Digi Kyokasho N-R", serif; }
        .quiz-hint-wrapper { text-align: center; font-size: 14px; color: var(--text-muted); }
        .quiz-hint-text { font-weight: 600; color: var(--accent); font-size: 16px; margin-top: 4px; display: block; }

        .game-input { width: 100%; padding: 16px; font-size: 16px; background-color: var(--bg-color); border: 2px solid var(--border-color); border-radius: 14px; outline: none; color: var(--text-color); box-sizing: border-box; text-align: center; font-weight: 600; transition: border-color 0.2s; font-family: "Noto Sans JP", sans-serif;}
        .game-input:focus { border-color: var(--border-color); }
        .type-actions { width: 100%; display: flex; flex-direction: column; gap: 8px; }

        .search-box-wrapper { width: 100%; margin-bottom: 8px; box-sizing: border-box; }
        .search-input { width: 100%; padding: 10px 14px; font-size: 14px; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 10px; outline: none; color: var(--text-color); box-sizing: border-box; transition: border-color 0.2s; font-family: "Noto Sans JP", sans-serif;}
        .search-input:focus { border-color: var(--border-color); }

        .vocab-table-wrapper { flex: 1; overflow-y: auto; overflow-x: auto; border: 1px solid var(--border-color); border-radius: 16px; background: var(--card-bg); -webkit-overflow-scrolling: touch; margin-bottom: 5px; }
        .vocab-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; white-space: nowrap; }
        .vocab-table th, .vocab-table td { padding: 14px 12px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
        .vocab-table th { background: var(--primary); color: var(--bg-color); position: sticky; top: 0; z-index: 100; font-weight: 600; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.6); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        .modal-content { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 24px; padding: 35px 24px 28px 24px; text-align: center; position: relative; width: 88%; max-width: 360px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); z-index: 2011; }
        .modal-close { position: absolute; top: 10px; right: 16px; font-size: 22px; cursor: pointer; color: var(--text-muted); }
        
        .modal-kanji { font-size: 64px; font-weight: bold; color: var(--text-color); font-family: "Klee One", "UD Digi Kyokasho N-R", serif; }
        .modal-hanviet { margin-top: 8px; font-size: 16px; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; margin: 0; }
        .modal-kana { margin-top: 4px; font-size: 15px; color: var(--text-color); }
        .modal-meaning { margin-top: 8px; font-size: 18px; font-weight: 600; }
        .modal-divider { border: none; border-top: 1px dashed var(--border-color); margin: 16px 0; }
        .modal-example-jp { font-size: 15px; color: var(--text-color); line-height: 1.4; margin-bottom: 6px; }
        .modal-example-vi { font-size: 13px; color: var(--text-muted); line-height: 1.4; display: inline-block; }
        
        .modal-action-btn { background-color: transparent; border: 1.5px solid var(--border-color); color: var(--text-color); padding: 8px 16px; border-radius: 20px; font-size: 13px; font-weight: bold; cursor: pointer; margin-top: 12px; transition: all 0.2s; }
        .modal-action-btn:hover { background-color: var(--primary); color: var(--bg-color); }

        /* Color Custom Picker Style Form */
        .color-picker-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; text-align: left; font-size: 13px; }
        .picker-item { display: flex; flex-direction: column; gap: 4px; }
        .picker-item input { width: 100%; height: 34px; border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; background: transparent; }
    </style>
</head>
<body>

<div class="header-row">
    <h1 class="title">徹底 N1</h1>
    <button id="color-custom-toggle" class="theme-toggle-btn" onclick="openColorCustomPopup()" title="Tùy chỉnh màu">🎨</button>
    <button id="offline-toggle" class="theme-toggle-btn" onclick="toggleOffline()" title="Bật/Tắt chế độ Offline">📶</button>
    <button id="theme-toggle" class="theme-toggle-btn" onclick="toggleTheme()" title="Sáng/Tối">☀️</button>
</div>

<div class="container">
    <div class="controls-row">
        <div class="select-wrapper">
            <label>Bài học:</label>
            <select id="lesson-select" onchange="loadSheet()"></select>
        </div>
        <label for="excel-file" class="file-input-label">📥 Input data</label>
        <input type="file" id="excel-file" accept=".xlsx, .xls" onchange="handleExcelUpload(event)">
    </div>

    <label class="bookmark-filter">
        <input type="checkbox" id="only-bookmarked" onchange="toggleStarredFilter()"> ⭐ Từ cần chú ý
    </label>

    <div class="mode-buttons">
        <button class="mode-btn active" onclick="switchTab('tab-flashcard', this)">Flashcard</button>
        <button class="mode-btn" onclick="switchTab('tab-typing', this)">Gõ Từ</button>
        <button class="mode-btn" onclick="switchTab('tab-manager', this)">Xem Danh Sách</button>
    </div>

    <!-- TAB FLASHCARD -->
    <div id="tab-flashcard" class="tab-content" style="display: flex;">
        <div class="flashcard" id="flashcard-container" onclick="flipCard()">
            <div class="flashcard-inner">
                <div class="flashcard-front">
                    <span class="card-icon-top star-icon" onclick="toggleStar(event)">☆</span>
                    <span class="card-icon-top eye-icon">👁️ 0</span>
                    <div class="word-main" id="fc-front-text">-</div>
                </div>
                
                <div class="flashcard-back">
                    <span class="card-icon-top star-icon" onclick="toggleStar(event)">☆</span>
                    <span class="card-icon-top eye-icon">👁️ 0</span>
                    
                    <div class="fb-container-top">
                        <div class="fb-hanviet" id="fc-hanviet">-</div>
                        <div class="fb-kana">
                            <span id="fc-kana"></span>
                            <button class="audio-btn" onclick="speakCurrentWord(event)">🔊</button>
                        </div>
                    </div>
                    
                    <div class="fb-mean" id="fc-meaning">-</div>
                    
                    <div style="font-size: 14px; color: var(--text-color); margin: 5px 0; display:none;" id="fc-same-box">
                        Từ đồng nghĩa: <span class="blur-box" id="fc-same" onclick="revealBlur(event, this)"></span>
                    </div>
                    
                    <div style="font-size:14px; border-top:1px dashed var(--border-color); padding-top:12px; width:100%; display: flex; flex-direction: column; align-items: center; gap: 8px;" id="fc-ex-box">
                        <div style="display: flex; align-items: center; justify-content: center;">
                            <span id="fc-ex-jp" style="font-style:italic; font-size:15px; color: var(--text-color); text-align: center;"></span>
                            <button class="audio-btn" onclick="speakCurrentExample(event)">🔊</button>
                        </div>
                        <span class="blur-box" id="fc-ex-vi" onclick="revealBlur(event, this)"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="nav-btn btn-prev" onclick="prevCard()">&larr; Trước</button>
            <button class="nav-btn btn-secondary" onclick="shuffleCards()">🔀 Trộn</button>
            <button class="nav-btn btn-next" onclick="nextCard()">Tiếp &rarr;</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar-bg">
                <div id="progress-fill" class="progress-bar-fill"></div>
            </div>
            <div class="progress-info">
                <span id="progress-text">Tiến độ: 0%</span>
                <span id="card-counter">0 / 0</span>
            </div>
        </div>

        <div class="difficulty-panel">
            <button class="diff-btn diff-again" onclick="handleDifficulty('again', event)"><span class="diff-icon">🔄</span>Học lại<span>Again</span></button>
            <button class="diff-btn diff-hard" onclick="handleDifficulty('hard', event)"><span class="diff-icon">🧠</span>Khó<span>Hard</span></button>
            <button class="diff-btn diff-good" onclick="handleDifficulty('good', event)"><span class="diff-icon">👍</span>Tốt<span>Good</span></button>
            <button class="diff-btn diff-easy" onclick="handleDifficulty('easy', event)"><span class="diff-icon">⭐</span>Dễ<span>Easy</span></button>
        </div>

        <footer>
            <a id="fc-gemini" href="#" target="_blank" onclick="handleExternalLink(event)">🔍 Tra Gemini</a>
            <span style="color:var(--border-color)">|</span>
            <a onclick="openMaziiApp(event)">📖 Từ điển Mazii</a>
        </footer>
    </div>

    <!-- TAB GÕ TỪ -->
    <div id="tab-typing" class="tab-content" style="display: none;">
        <div class="quiz-stats-board">
            <div class="stat-item">
                <span class="stat-label">Đúng</span>
                <span id="type-correct-count" class="stat-val correct">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Sai / Qua</span>
                <span id="type-wrong-count" class="stat-val wrong">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Tổng đã gõ</span>
                <span id="type-total-count" class="stat-val total">0</span>
            </div>
        </div>

        <div class="quiz-card">
            <div class="quiz-question" id="type-q">-</div>
            <div class="quiz-hint-wrapper">
                Gợi ý ý nghĩa:
                <span id="type-hint" class="quiz-hint-text">-</span>
            </div>
            
            <input type="text" id="type-input" class="game-input" placeholder="Nhập cách đọc Hiragana/Kana..." onkeydown="checkTyping(event)" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
            
            <div class="type-actions">
                <button id="type-skip-btn" class="mode-btn" style="width: 100%; padding: 14px; border-radius: 14px;" onclick="skipTyping()">Bỏ qua / Câu khác</button>
                <button class="mode-btn" style="width: 100%; padding: 14px; border-radius: 14px; margin-top: 4px;" onclick="openTypingHistory()">📝 Xem lịch sử gõ</button>
            </div>
            <p id="type-feedback" style="text-align:center; font-weight:bold; font-size:14px; height:20px; margin: 0;"></p>

    <!-- TAB DANH SÁCH -->
    <div id="tab-manager" class="tab-content" style="display: none;">
        <div class="search-box-wrapper">
            <input type="text" id="vocab-search-input" class="search-input" placeholder="🔍 Tra TOÀN BỘ bài học (Kanji, Hán Việt, Ý nghĩa)..." oninput="filterManagerList()">
        </div>

        <h3 id="manager-title" style="margin:2px 0 6px 0; font-size:14px; color:var(--text-color);">Danh sách</h3>
        <div class="vocab-table-wrapper">
            <table class="vocab-table">
                <thead>
                    <tr>
                        <th>STT</th>
                        <th>⭐</th>
                        <th>👁️</th>
                        <th>Từ vựng</th>
                        <th>Hán Việt</th>
                        <th>Cách đọc</th>
                        <th>Ý nghĩa</th>
                    </tr>
                </thead>
                <tbody id="vocab-list-tbody"></tbody>
            </table>

</div>

<!-- Modal Từ Vựng -->
<div id="kanji-popup" class="modal-overlay" onclick="closeKanjiPopup()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="modal-close" onclick="closeKanjiPopup()">&times;</span>
        <div id="modal-kanji-text" class="modal-kanji"></div>

        <hr class="modal-divider">

            <button class="modal-action-btn" onclick="openMaziiFromPopup(event)">📖 Tra từ điển Mazii</button>
        </div>

<!-- Modal Lịch sử Gõ từ -->
<div id="typing-history-modal" class="modal-overlay" onclick="closeTypingHistory()">
    <div class="modal-content" onclick="event.stopPropagation()" style="max-height: 80vh; display: flex; flex-direction: column; width: 90%; max-width: 400px; padding: 20px;">
        <span class="modal-close" onclick="closeTypingHistory()">&times;</span>
        <h3 style="margin-top: 0; margin-bottom: 12px; color: var(--text-color);">Lịch sử gõ từ</h3>
        <div style="flex: 1; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 12px; background: var(--bg-color);">
            <table style="width: 100%; border-collapse: collapse; font-size: 14px; text-align: left;">
                <thead style="position: sticky; top: 0; background: var(--blur-bg); z-index: 10;">
                    <tr>
                        <th style="padding: 10px; border-bottom: 1px solid var(--border-color);">Từ vựng</th>
                        <th style="padding: 10px; border-bottom: 1px solid var(--border-color);">Đã nhập</th>

                <tbody id="type-history-tbody"></tbody>
            </table>

        <button class="mode-btn" style="width: 100%; padding: 12px; margin-top: 16px; color: var(--text-color); background-color: var(--error);" onclick="clearTypingHistory()">🗑 Làm mới danh sách</button>
    </div>
</div>

<!-- Modal Tùy Chỉnh Màu Sắc -->
<div id="color-custom-modal" class="modal-overlay" onclick="closeColorCustomPopup()">
    <div class="modal-content" onclick="event.stopPropagation()" style="width: 90%; max-width: 380px;">
        <span class="modal-close" onclick="closeColorCustomPopup()">&times;</span>
        <h3 style="margin-top: 0; margin-bottom: 4px; color: var(--text-color);">Tùy chỉnh bảng màu</h3>
        <p style="font-size:12px; color: var(--text-muted); margin-bottom:12px;" id="color-picker-theme-label">Đang sửa cấu hình theme: </p>
        
        <div class="color-picker-grid">
            <div class="picker-item">
                <label>Màu Nền:</label>
                <input type="color" id="cp-bg" onchange="applyCustomColorStyle()">
            </div>
            <div class="picker-item">
                <label>Nền Thẻ Card:</label>
                <input type="color" id="cp-card" onchange="applyCustomColorStyle()">
            </div>
            <div class="picker-item">
                <label>Màu Chủ Đạo:</label>
                <input type="color" id="cp-primary" onchange="applyCustomColorStyle()">
            </div>
            <div class="picker-item">
                <label>Màu Phụ:</label>
                <input type="color" id="cp-secondary" onchange="applyCustomColorStyle()">
            </div>
            <div class="picker-item">
                <label>Điểm Nhấn:</label>
                <input type="color" id="cp-accent" onchange="applyCustomColorStyle()">
            </div>
            <div class="picker-item">
                <label>Màu Chữ:</label>
                <input type="color" id="cp-text" onchange="applyCustomColorStyle()">
            </div>
        </div>
        
        <div style="margin-top: 20px; display: flex; gap: 10px;">
            <button class="mode-btn" style="flex:1; padding: 10px;" onclick="resetCustomColors()">Khôi phục chuẩn</button>
            <button class="mode-btn active" style="flex:1; padding: 10px;" onclick="closeColorCustomPopup()">Hoàn tất</button>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW fail:', err));
        });
    }

    // KHỞI TẠO HỆ THỐNG MÀU SẮC TÙY CHỈNH THEO LOCALSTORAGE
    (function() {
        const savedTheme = localStorage.getItem('app_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        applySavedCustomColors(savedTheme);
    })();

    let isOfflineMode = false;

    function unlockAudio() {
        try {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(' ');
            u.lang = 'ja-JP'; u.volume = 0;
            window.speechSynthesis.speak(u);
        } catch(e) { console.log(e); }
        window.removeEventListener('click', unlockAudio);
        window.removeEventListener('touchstart', unlockAudio);
    }
    window.addEventListener('click', unlockAudio);
    window.addEventListener('touchstart', unlockAudio);

    const KANJI_DICTIONARY = {
        "一":"NHẤT","二":"NHỊ","三":"TAM","四":"TỨ","五":"NGŨ","六":"LỤC","七":"THẤT","八":"BÁT","九":"CỬU","十":"THẬP",
        "大":"ĐẠI","小":"TIỂU","中":"TRUNG","国":"QUỐC","人":"NHÂN","年":"NIÊN","生":"SINH","学":"HỌC","会":"HỘI","社":"XÃ"
    };

    let db = JSON.parse(localStorage.getItem('jlpt_kanji_db')) || {
        "N1_Mondai_Demo": [
            { kanji: "維持", kana: "いじ", meaning: "duy trì", exampleJp: "高度な日本語をマスターするためには、「維持」のようなN1レベル của ngữ cảnh.", exampleVi: "Để làm chủ tiếng Nhật cao cấp, các từ vựng cấp độ N1 như 「duy trì」 là không thể thiếu.", synonym: "キープ", hanviet: "DUY TRÌ", flipCount: 0, starred: false, interval: 0, ease: 2.5, nextReview: 0 }
        ]
    };
    let currentList = [], activeWordIndex = 0, currentSheetName = "";
    let typingStats = { correct: 0, wrong: 0, total: 0 };
    let typeHistoryList = []; 
    let currentUtterance = null; 

    window.onload = () => { 
        updateThemeToggleIcon();
        initSheetSelect(); 
    };

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('app_theme', newTheme);
        updateThemeToggleIcon();
        applySavedCustomColors(newTheme);
    }

    function updateThemeToggleIcon() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        document.getElementById('theme-toggle').innerText = currentTheme === 'light' ? '🌙' : '☀️';
    }

    // CÁC HÀM XỬ LÝ CHO BỘ TÙY CHỈNH MÀU SẮC DỰA TRÊN LOCALSTORAGE
    function applySavedCustomColors(theme) {
        const customColors = JSON.parse(localStorage.getItem(`custom_colors_${theme}`));
        if (customColors) {
            for (const [key, value] of Object.entries(customColors)) {
                document.documentElement.style.setProperty(key, value);
            }
        } else {
            // Xóa biến môi trường custom nếu dùng màu mặc định gốc
            const props = ['--bg-color', '--card-bg', '--primary', '--secondary', '--accent', '--text-color'];
            props.forEach(p => document.documentElement.style.removeProperty(p));
        }
    }

    function openColorCustomPopup() {
        const theme = document.documentElement.getAttribute('data-theme');
        document.getElementById('color-picker-theme-label').innerText = `Đang sửa cấu hình giao diện: ${theme === 'light' ? 'SÁNG (Light)' : 'TỐI (Dark)'}`;
        
        const computedStyle = getComputedStyle(document.documentElement);
        document.getElementById('cp-bg').value = rgb2hex(computedStyle.getPropertyValue('--bg-color').trim());
        document.getElementById('cp-card').value = rgb2hex(computedStyle.getPropertyValue('--card-bg').trim());
        document.getElementById('cp-primary').value = rgb2hex(computedStyle.getPropertyValue('--primary').trim());
        document.getElementById('cp-secondary').value = rgb2hex(computedStyle.getPropertyValue('--secondary').trim());
        document.getElementById('cp-accent').value = rgb2hex(computedStyle.getPropertyValue('--accent').trim());
        document.getElementById('cp-text').value = rgb2hex(computedStyle.getPropertyValue('--text-color').trim());
        
        document.getElementById('color-custom-modal').style.display = 'flex';
    }

    function closeColorCustomPopup() {
        document.getElementById('color-custom-modal').style.display = 'none';
    }

    function applyCustomColorStyle() {
        const theme = document.documentElement.getAttribute('data-theme');
        const config = {
            '--bg-color': document.getElementById('cp-bg').value,
            '--card-bg': document.getElementById('cp-card').value,
            '--primary': document.getElementById('cp-primary').value,
            '--secondary': document.getElementById('cp-secondary').value,
            '--accent': document.getElementById('cp-accent').value,
            '--text-color': document.getElementById('cp-text').value
        };
        for (const [key, val] of Object.entries(config)) {
            document.documentElement.style.setProperty(key, val);
        }
        localStorage.setItem(`custom_colors_${theme}`, JSON.stringify(config));
    }

    function resetCustomColors() {
        const theme = document.documentElement.getAttribute('data-theme');
        localStorage.removeItem(`custom_colors_${theme}`);
        applySavedCustomColors(theme);
        closeColorCustomPopup();
    }

    function rgb2hex(rgb) {
        if (/^#[0-9A-F]{6}$/i.test(rgb)) return rgb;
        let match = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
        if (!match) return '#ffffff';
        function hex(x) { return ("0" + parseInt(x).toString(16)).slice(-2); }
        return "#" + hex(match[1]) + hex(match[2]) + hex(match[3]);
    }

    function toggleOffline() {
        isOfflineMode = !isOfflineMode;
        const iconBtn = document.getElementById('offline-toggle');
        iconBtn.innerText = isOfflineMode ? '📴' : '📶';
        iconBtn.style.color = isOfflineMode ? 'var(--error)' : 'inherit';
        
        if (isOfflineMode) {
            alert("Đã BẬT chế độ Offline 📴.\nPhát âm thanh, tra từ điển Mazii & Gemini sẽ bị khóa để không tốn Data mạng.");
        } else {
            alert("Đã TẮT chế độ Offline 📶.\nCác tính năng mạng hoạt động bình thường.");
        }
    }

    function handleExternalLink(e) {
        if(isOfflineMode) {
            e.preventDefault();
            alert("Bạn đang ở chế độ Offline 📴.\nVui lòng bật lại mạng (📶) để sử dụng tính năng tra cứu ngoại tuyến!");
        }
    }

    function autoTranslateHanViet(text, customDb) {
        if (!text) return "";
        const activeDb = customDb || db;
        if (activeDb['_amHanViet'] && activeDb['_amHanViet'][text]) return activeDb['_amHanViet'][text];
        let result = [];
        for (let char of text) {
            if (/[\u4e00-\u9faf]/.test(char)) {
                if (activeDb['_amHanViet'] && activeDb['_amHanViet'][char]) result.push(activeDb['_amHanViet'][char]);
                else result.push(KANJI_DICTIONARY[char] || char);
            }
        }
        return result.length > 0 ? result.join(" ") : "";
    }

    function generateAutoExample(kanji, meaning) {
        if (!kanji) return { j: "", v: "" };
        const templates = [
            {
                j: `文章の文脈に合わせて、「${kanji}」を正しく使い分けることが表現力を高める鍵です。`,
                v: `Việc sử dụng đúng từ 「${meaning || kanji}」 phù hợp với ngữ cảnh của đoạn văn là chìa khóa để nâng cao khả năng diễn đạt.`
            },
            {
                j: `ビジネスの場において、「${kanji}」という概念を深く理解しておくことは非常に重要です。`,
                v: `Trong môi trường kinh doanh, việc hiểu sâu sắc khái niệm 「${meaning || kanji}」 là điều vô cùng quan trọng.`
            },
            {
                j: `高度な日本語をマスターするためには、「${kanji}」のようなN1レベルの語彙が欠かせません。`,
                v: `Để làm chủ tiếng Nhật cao cấp, các từ vựng cấp độ N1 như 「${meaning || kanji}」 là không thể thiếu.`
            },
            {
                j: `最新の論文によると、この実験結果は「${kanji}」の重要性を明確に示している。`,
                v: `Theo các luận văn mới nhất, kết quả thực nghiệm này đã chỉ ra một cách rõ ràng tầm quan trọng của 「${meaning || kanji}」.`
            },
            {
                j: `専門家 là, 今後の社会情勢において「${kanji}」のプロセスが加速すると分析している。`,
                v: `Các chuyên gia phân tích rằng trong tình hình xã hội tới đây, quá trình 「${meaning || kanji}」 sẽ tăng tốc.`
            }
        ];
        
        let index = 0;
        for (let i = 0; i < kanji.length; i++) { index += kanji.charCodeAt(i); }
        return templates[index % templates.length];
    }

    function highlightKeyword(sentence, keyword) {
        if (!sentence || !keyword) return sentence || '';
        const escapedKeyword = keyword.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
        const regex = new RegExp(escapedKeyword, 'g');
        return sentence.replace(regex, `<mark class="highlight-word">${keyword}</mark>`);
    }

    function initSheetSelect() {
        const select = document.getElementById('lesson-select'); select.innerHTML = '';
        for (const sheet in db) {
            if (sheet === '_amHanViet') continue;
            let opt = document.createElement('option'); opt.value = sheet; opt.innerHTML = sheet; select.appendChild(opt);
        }
        loadSheet();
    }

    function handleExcelUpload(e) {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const newDb = {};

                if (workbook.SheetNames.includes('AmHanViet')) {
                    const worksheet = workbook.Sheets['AmHanViet'];
                    let rowIndex = 2; let emptyStreak = 0; const amHanVietMap = {};
                    while (emptyStreak < 30) {
                        const cellA = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 0})];
                        const valA = cellA && cellA.v !== undefined ? String(cellA.v).trim() : "";
                        if (valA) {
                            emptyStreak = 0;
                            const cellB = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 1})];
                            const valB = cellB && cellB.v !== undefined ? String(cellB.v).trim() : "";
                            if (valB) amHanVietMap[valA] = valB.toUpperCase();
                        } else { emptyStreak++; }
                        rowIndex++;
                    }
                    newDb['_amHanViet'] = amHanVietMap;
                } else if (db['_amHanViet']) {
                    newDb['_amHanViet'] = db['_amHanViet'];
                }

                workbook.SheetNames.forEach(sheetName => {
                    if (sheetName === 'AmHanViet') return;
                    const worksheet = workbook.Sheets[sheetName]; const sheetData = [];
                    let rowIndex = 2; let emptyStreak = 0;
                    while (emptyStreak < 30) {
                        const cellB = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 1})];
                        const valB = cellB && cellB.v !== undefined ? String(cellB.v).trim() : "";
                        
                        if (valB) {
                            emptyStreak = 0;
                            const cellC = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 2})];
                            const cellD = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 3})];
                            const cellE = worksheet[XLSX.utils.encode_cell({r: rowIndex - 1, c: 4})];
                            
                            let hv = cellC && cellC.v !== undefined ? String(cellC.v).trim() : "";
                            if (!hv) hv = autoTranslateHanViet(valB, newDb);
                            
                            let targetMeaning = cellE && cellE.v !== undefined ? String(cellE.v).trim() : "";
                            
                            let autoEx = generateAutoExample(valB, targetMeaning);
                            
                            sheetData.push({
                                kanji: valB, 
                                kana: cellD && cellD.v !== undefined ? String(cellD.v).trim() : "",
                                meaning: targetMeaning,
                                exampleJp: autoEx.j, 
                                exampleVi: autoEx.v, 
                                synonym: "", 
                                hanviet: hv, 
                                flipCount: 0, starred: false,
                                interval: 0, ease: 2.5, nextReview: 0
                            });
                        } else { emptyStreak++; }
                        rowIndex++;
                    }
                    if (sheetData.length > 0) newDb[sheetName] = sheetData;
                });

                if (Object.keys(newDb).filter(k => k !== '_amHanViet').length > 0) {
                    db = newDb; saveToLocalStorage(); alert("📥 Data đã được nạp và tự động tạo câu ví dụ!"); initSheetSelect();
                } else { alert("Lỗi định dạng dữ liệu tệp!"); }
            } catch (err) { alert("Lỗi: " + err.message); }
        };
        reader.readAsArrayBuffer(file);
    }

    function loadSheet() {
        const selectVal = document.getElementById('lesson-select').value;
        currentSheetName = selectVal || Object.keys(db).filter(k => k !== '_amHanViet')[0];
        if (!currentSheetName) return;
        document.getElementById('only-bookmarked').checked = false;
        
        const searchInput = document.getElementById('vocab-search-input');
        if(searchInput) searchInput.value = '';

        currentList = (db[currentSheetName] || []).map(w => { 
            w.hanviet = w.hanviet || autoTranslateHanViet(w.kanji); 
            if (w.interval === undefined) w.interval = 0;
            if (w.ease === undefined) w.ease = 2.5;
            if (w.nextReview === undefined) w.nextReview = 0;
            if (!w.exampleJp) {
                let autoEx = generateAutoExample(w.kanji, w.meaning);
                w.exampleJp = autoEx.j;
                w.exampleVi = autoEx.v;
            }
            return w; 
        });
        activeWordIndex = 0; updateFlashcard(); resetTypingCounters();
        if(document.getElementById('tab-manager').style.display === 'flex') { renderManagerList(); }
    }

    function saveToLocalStorage() { localStorage.setItem('jlpt_kanji_db', JSON.stringify(db)); }

    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.mode-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).style.display = 'flex';
        if(btn) btn.classList.add('active');
        if(tabId === 'tab-manager') {
            document.getElementById('vocab-search-input').value = '';
            renderManagerList();
        }
        if(tabId === 'tab-typing') { updateTypingStatsUI(); setTimeout(() => document.getElementById('type-input').focus(), 150); }
    }

    function updateFlashcard() {
        if(currentList.length === 0) { 
            document.getElementById('fc-front-text').innerText = "Trống"; 
            document.getElementById('progress-fill').style.width = '0%';
            document.getElementById('progress-text').innerText = `Tiến độ: 0%`;
            document.getElementById('card-counter').innerText = `0 / 0`;
            return; 
        }
        const word = currentList[activeWordIndex];
        document.getElementById('fc-front-text').innerText = word.kanji;
        
        const views = `👁️ ${word.flipCount || 0}`;
        document.querySelectorAll('.eye-icon').forEach(el => { el.innerText = views; });
        updateStarUI();

        document.getElementById('fc-hanviet').innerText = word.hanviet || autoTranslateHanViet(word.kanji);
        document.getElementById('fc-kana').innerText = word.kana ? `[ ${word.kana} ]` : '';
        document.getElementById('fc-meaning').innerText = word.meaning;

        const sameBox = document.getElementById('fc-same-box');
        if (word.synonym) { 
            const sameEl = document.getElementById('fc-same');
            sameEl.innerText = word.synonym; 
            sameEl.classList.remove('revealed');
            sameBox.style.display = 'block'; 
        } else { sameBox.style.display = 'none'; }

        const exBox = document.getElementById('fc-ex-box');
        if (word.exampleJp) {
            document.getElementById('fc-ex-jp').innerHTML = highlightKeyword(word.exampleJp, word.kanji);
            const viEl = document.getElementById('fc-ex-vi');
            viEl.innerText = word.exampleVi || 'Chưa có bản dịch';
            viEl.classList.remove('revealed'); 
            exBox.style.display = 'flex';
        } else { exBox.style.display = 'none'; }

        const total = currentList.length;
        const currentPos = activeWordIndex + 1;
        const pct = Math.round((currentPos / total) * 100);
        
        document.getElementById('card-counter').innerText = `${currentPos} / ${total}`;
        document.getElementById('progress-fill').style.width = `${pct}%`;
        document.getElementById('progress-text').innerText = `Tiến độ: ${pct}%`;
        
        document.getElementById('flashcard-container').classList.remove('flipped');
        document.getElementById('fc-gemini').href = `https://gemini.google.com/?q=Phân tích từ vựng N1: "${word.kanji}"`;
    }

    async function openMaziiApp(e) {
        if(e) e.stopPropagation();
        if (isOfflineMode) { alert("Bạn đang ở chế độ Offline 📴."); return; }
        if(currentList.length === 0) return;
        const word = currentList[activeWordIndex];
        const text = word.kanji;
        try { if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); } } catch (err) { }
        const keyword = encodeURIComponent(text);
        const webUrl = `https://mazii.net/vi-VN/search/word/ja/${keyword}`;
        const appUrl = `mazii://search/${keyword}`;
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            const startTime = Date.now(); window.location.href = appUrl;
            setTimeout(() => { if (Date.now() - startTime < 800) { window.location.href = webUrl; } }, 500);
        } else { window.open(webUrl, '_blank'); }
    }

    async function openMaziiFromPopup(e) {
        if(e) e.stopPropagation();
        if (isOfflineMode) { alert("Bạn đang ở chế độ Offline 📴."); return; }
        const kanjiText = document.getElementById('modal-kanji-text').innerText;
        if(!kanjiText || kanjiText === '-') return;
        try { if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(kanjiText); } } catch (err) { }
        const keyword = encodeURIComponent(kanjiText);
        const webUrl = `https://mazii.net/vi-VN/search/word/ja/${keyword}`;
        const appUrl = `mazii://search/${keyword}`;
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            const startTime = Date.now(); window.location.href = appUrl;
            setTimeout(() => { if (Date.now() - startTime < 800) { window.location.href = webUrl; } }, 500);
        } else { window.open(webUrl, '_blank'); }
    }

    function handleDifficulty(level, event) {
        if(event) event.stopPropagation();
        if(currentList.length === 0) return;
        
        const word = currentList[activeWordIndex];
        const now = Date.now();
        
        if (!word.interval) word.interval = 0;
        if (!word.ease) word.ease = 2.5;

        if (level === 'again') {
            word.interval = 1; 
            word.ease = Math.max(1.3, word.ease - 0.2);
        } else if (level === 'hard') {
            word.interval = word.interval === 0 ? 3 : Math.round(word.interval * 1.2); 
            word.ease = Math.max(1.3, word.ease - 0.15);
        } else if (level === 'good') {
            word.interval = word.interval === 0 ? 10 : Math.round(word.interval * word.ease); 
        } else if (level === 'easy') {
            word.interval = word.interval === 0 ? 30 : Math.round(word.interval * word.ease * 1.5); 
            word.ease += 0.15;
        }

        word.nextReview = now + word.interval * 60 * 1000; 
        saveToLocalStorage();
        nextCard();
    }

    function flipCard() {
        const card = document.getElementById('flashcard-container');
        if (card.classList.toggle('flipped') && currentList.length > 0) {
            currentList[activeWordIndex].flipCount = (currentList[activeWordIndex].flipCount || 0) + 1;
            saveToLocalStorage();
            document.querySelectorAll('.eye-icon').forEach(el => el.innerText = `👁️ ${currentList[activeWordIndex].flipCount}`);
        }
    }

    function nextCard() { if(currentList.length === 0) return; if(activeWordIndex < currentList.length - 1) activeWordIndex++; else activeWordIndex = 0; updateFlashcard(); }
    function prevCard() { if(currentList.length === 0) return; if(activeWordIndex > 0) activeWordIndex--; else activeWordIndex = currentList.length - 1; updateFlashcard(); }
    function shuffleCards() { if(currentList.length === 0) return; currentList.sort(() => Math.random() - 0.5); activeWordIndex = 0; updateFlashcard(); }
    
    function toggleStar(e) { e.stopPropagation(); if(!currentList[activeWordIndex]) return; currentList[activeWordIndex].starred = !currentList[activeWordIndex].starred; saveToLocalStorage(); updateStarUI(); }
    function updateStarUI() {
        const word = currentList[activeWordIndex]; if(!word) return;
        document.querySelectorAll('.star-icon').forEach(el => { 
            el.innerText = word.starred ? "⭐" : "☆"; 
            el.style.color = word.starred ? "#ffc107" : ""; 
        });
    }
    
    function toggleStarredFilter() {
        const full = db[currentSheetName] || [];
        currentList = document.getElementById('only-bookmarked').checked ? full.filter(w => w.starred) : [...full];
        if(currentList.length === 0) { alert("Chưa có thẻ đánh dấu!"); document.getElementById('only-bookmarked').checked = false; currentList = [...full]; }
        const searchInput = document.getElementById('vocab-search-input');
        if(searchInput) searchInput.value = '';
        activeWordIndex = 0; updateFlashcard(); filterManagerList(); 
    }

    function speakJapaneseText(e, text) { 
        if(e) e.stopPropagation(); 
        if (isOfflineMode) { alert("Đang ở chế độ Offline 📴."); return; }
        if(!text) return;
        try { window.speechSynthesis.cancel(); } catch(err) { }
        const cleanText = text.replace(/<[^>]*>/g, ''); 
        currentUtterance = new SpeechSynthesisUtterance(cleanText); 
        currentUtterance.lang = 'ja-JP'; currentUtterance.rate = 0.95; 
        if (window.speechSynthesis.getVoices) {
            const voices = window.speechSynthesis.getVoices();
            let premiumVoice = voices.find(v => v.lang.startsWith('ja') && v.name.toLowerCase().includes('siri')) ||
                               voices.find(v => v.lang.startsWith('ja') && v.name.toLowerCase().includes('premium')) ||
                               voices.find(v => v.lang.startsWith('ja'));
            if (premiumVoice) currentUtterance.voice = premiumVoice;
        }
        setTimeout(() => { window.speechSynthesis.speak(currentUtterance); }, 50);
    }
    
    function speakCurrentWord(e) { const w = currentList[activeWordIndex]; speakJapaneseText(e, w.kana || w.kanji); }
    function speakCurrentExample(e) { speakJapaneseText(e, currentList[activeWordIndex].exampleJp); }
    function revealBlur(e, el) { if(e) e.stopPropagation(); el.classList.toggle('revealed'); }

    let typeCurrent = null;
    function resetTypingCounters() { typingStats = { correct: 0, wrong: 0, total: 0 }; updateTypingStatsUI(); loadNextType(); }
    function updateTypingStatsUI() {
        document.getElementById('type-correct-count').innerText = typingStats.correct;
        document.getElementById('type-wrong-count').innerText = typingStats.wrong;
        document.getElementById('type-total-count').innerText = typingStats.total;
    }
    
    function loadNextType() { 
        if (currentList.length === 0) return;
        let kanjiOnlyList = currentList.filter(w => /[\u4e00-\u9faf]/.test(w.kanji));
        if (kanjiOnlyList.length === 0) kanjiOnlyList = currentList;
        if (kanjiOnlyList.length === 0) {
            document.getElementById('type-q').innerText = "Trống"; document.getElementById('type-hint').innerText = "-"; return;
        }
        typeCurrent = kanjiOnlyList[Math.floor(Math.random() * kanjiOnlyList.length)]; 
        document.getElementById('type-q').innerText = typeCurrent.kanji; 
        document.getElementById('type-hint').innerText = typeCurrent.meaning;
        const i = document.getElementById('type-input'); i.value = ''; i.disabled = false; 
        document.getElementById('type-feedback').innerText = ''; i.focus(); 
    }
    
    function checkTyping(e) { 
        if (e.key === 'Enter' || e.keyCode === 13) { 
            const i = document.getElementById('type-input'); 
            const v = i.value.trim().toLowerCase(); 
            if (!v) return;
            
            e.preventDefault(); 
            i.disabled = true; 
            typingStats.total += 1;

            if (v === typeCurrent.kana.toLowerCase()) { 
                typingStats.correct += 1; updateTypingStatsUI();
                document.getElementById('type-feedback').style.color = 'var(--text-color)'; 
                document.getElementById('type-feedback').innerText = 'Chính xác! 🎉'; 
                typeHistoryList.unshift({ word: typeCurrent.kanji, kana: typeCurrent.kana, input: i.value.trim(), status: 'Đúng', color: 'var(--text-color)' });
                setTimeout(loadNextType, 800); 
            } else { 
                typingStats.wrong += 1; updateTypingStatsUI();
                document.getElementById('type-feedback').style.color = 'var(--text-color)'; 
                document.getElementById('type-feedback').innerText = `Sai rồi! Đáp án: ${typeCurrent.kana}`; 
                typeHistoryList.unshift({ word: typeCurrent.kanji, kana: typeCurrent.kana, input: i.value.trim(), status: 'Sai', color: 'var(--text-color)' });
                setTimeout(loadNextType, 1800); 
            } 
        } 
    }

    function skipTyping() {
        if (!typeCurrent) return;
        typingStats.total += 1; typingStats.wrong += 1; updateTypingStatsUI();
        document.getElementById('type-feedback').style.color = 'var(--text-muted)';
        document.getElementById('type-feedback').innerText = `Đáp án đúng: ${typeCurrent.kana}`;
        document.getElementById('type-input').disabled = true;
        typeHistoryList.unshift({ word: typeCurrent.kanji, kana: typeCurrent.kana, input: '(Bỏ qua)', status: 'Qua', color: 'var(--text-muted)' });
        setTimeout(loadNextType, 1200);
    }

    function renderDiff(input, correct) {
        if (input === '(Bỏ qua)') return `<span style="color:var(--text-muted); font-style:italic;">${input}</span>`;
        let html = '', maxLen = Math.max(input.length, correct.length);
        for (let i = 0; i < maxLen; i++) {
            let cIn = input[i] || '', cCorr = correct[i] || '';
            if (cIn.toLowerCase() === cCorr.toLowerCase()) { html += `<span>${cIn}</span>`; } 
            else if (cIn) { html += `<span style="background-color: rgba(0,0,0,0.2); color: var(--text-color); font-weight: bold; text-decoration: line-through;">${cIn}</span>`; }
        }
        return html;
    }

    function renderCorrectDiff(input, correct) {
        if (input === '(Bỏ qua)') return `<span>${correct}</span>`;
        let html = '', maxLen = Math.max(input.length, correct.length);
        for (let i = 0; i < maxLen; i++) {
            let cIn = input[i] || '', cCorr = correct[i] || '';
            if (cIn.toLowerCase() === cCorr.toLowerCase()) { html += `<span>${cCorr}</span>`; } 
            else if (cCorr) { html += `<span style="border-bottom: 2px solid var(--text-color); font-weight: bold;">${cCorr}</span>`; }
        }
        return html;
    }

    function openTypingHistory() {
        const tbody = document.getElementById('type-history-tbody'); tbody.innerHTML = '';
        if (typeHistoryList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; padding: 20px; color: var(--text-muted);">Chưa có dữ liệu gõ trong phiên này</td></tr>';
        } else {
            typeHistoryList.forEach(item => {
                const displayInput = item.status === 'Sai' ? renderDiff(item.input, item.kana) : item.input;
                const displayCorrectReading = item.status === 'Sai' ? renderCorrectDiff(item.input, item.kana) : item.kana;
                tbody.innerHTML += `
                    <tr>
                        <td style="padding: 10px; border-bottom: 1px dashed var(--border-color);">
                            <strong>${item.word}</strong><br><small style="color:var(--text-muted)">${displayCorrectReading}</small>
                        </td>
                        <td style="padding: 10px; border-bottom: 1px dashed var(--border-color);">${displayInput}</td>
                        <td style="padding: 10px; border-bottom: 1px dashed var(--border-color); font-weight: bold;">${item.status}</td>
                    </tr>`;
            });
        }
        document.getElementById('typing-history-modal').style.display = 'flex';
    }

    function closeTypingHistory() { document.getElementById('typing-history-modal').style.display = 'none'; }
    function clearTypingHistory() { typeHistoryList = []; openTypingHistory(); }

    function renderManagerList() {
        document.getElementById('manager-title').innerText = `Bài học: ${currentSheetName}`; filterManagerList(); 
    }

    // TRA CỨU TOÀN BỘ CÁC MỤC BÀI HỌC KHÁC NHAU VÀ CHÚ THÍCH RÕ RÀNG VỊ TRÍ
    function filterManagerList() {
        const keyword = document.getElementById('vocab-search-input').value.trim().toLowerCase();
        const tbody = document.getElementById('vocab-list-tbody'); tbody.innerHTML = '';
        const isOnlyBookmarked = document.getElementById('only-bookmarked').checked;
        
        // Duyệt toàn bộ database các sheet để tìm kiếm diện rộng
        for (const sheetName in db) {
            if (sheetName === '_amHanViet') continue;
            
            // Nếu không có keyword, chỉ hiển thị dữ liệu bài học hiện tại để tối ưu giao diện
            if (!keyword && sheetName !== currentSheetName) continue;
            
            const sheetWordsList = db[sheetName] || [];
            
            sheetWordsList.forEach((w, index) => {
                const isStarredMatch = !isOnlyBookmarked || w.starred;
                if (!isStarredMatch) return;
                
                const kj = (w.kanji || '').toLowerCase(); 
                const hv = (w.hanviet || autoTranslateHanViet(w.kanji)).toLowerCase();
                const mn = (w.meaning || '').toLowerCase(); 
                const kn = (w.kana || '').toLowerCase();
                
                // Kiểm tra điều kiện tìm kiếm
                if (keyword && !kj.includes(keyword) && !hv.includes(keyword) && !mn.includes(keyword) && !kn.includes(keyword)) return; 

                let tr = document.createElement('tr');
                
                // Thiết lập hành động click xem chi tiết dựa theo mục bài học gốc của từ đó
                tr.onclick = () => {
                    if (currentSheetName !== sheetName) {
                        document.getElementById('lesson-select').value = sheetName;
                        currentSheetName = sheetName;
                        const full = db[currentSheetName] || [];
                        currentList = [...full];
                    }
                    showKanjiPopup(index);
                };
                
                // Hiển thị chú thích vị trí rõ ràng: Tên bài học kèm chỉ số dòng thực tế
                const positionAnnotation = keyword ? `<small style="display:block;color:var(--text-muted);font-size:10px;">${sheetName}</small>Dòng ${index + 2}` : `${index + 2}`;

                tr.innerHTML = `
                    <td>${positionAnnotation}</td>
                    <td onclick="event.stopPropagation(); toggleStarFromList('${sheetName}', ${index})">${w.starred ? '⭐' : '☆'}</td>
                    <td>${w.flipCount || 0}</td>
                    <td style="font-weight: bold; color: var(--text-color); text-decoration: underline dotted;">${w.kanji}</td>
                    <td style="color: var(--accent); font-weight: bold; text-transform: uppercase;">${w.hanviet || autoTranslateHanViet(w.kanji)}</td>
                    <td>${w.kana || '---'}</td>
                    <td style="max-width: 150px; overflow: hidden; text-overflow: ellipsis;">${w.meaning}</td>`;
                tbody.appendChild(tr);
            });
        }
    }

    function toggleStarFromList(sheetName, index) {
        const listData = db[sheetName] || [];
        if (listData[index]) {
            listData[index].starred = !listData[index].starred; 
            saveToLocalStorage();
            if (sheetName === currentSheetName) {
                const full = db[currentSheetName] || [];
                currentList = document.getElementById('only-bookmarked').checked ? full.filter(w => w.starred) : [...full];
                updateFlashcard();
            }
            filterManagerList(); 
        }
    }

    function showKanjiPopup(index) {
        const listData = db[currentSheetName] || []; const word = listData[index]; if (!word) return;
        document.getElementById('modal-kanji-text').innerText = word.kanji;
        document.getElementById('modal-hanviet-text').innerText = word.hanviet || autoTranslateHanViet(word.kanji);
        document.getElementById('modal-kana-text').innerText = word.kana ? `[ ${word.kana} ]` : '';
        document.getElementById('modal-meaning-text').innerText = word.meaning;
        const modalViEl = document.getElementById('modal-example-vi'); modalViEl.classList.remove('revealed'); 

        if (word.exampleJp) {
            document.getElementById('modal-example-jp').innerHTML = highlightKeyword(word.exampleJp, word.kanji);
            modalViEl.innerText = word.exampleVi || 'Chưa có bản dịch'; modalViEl.style.display = 'inline-block';
        } else {
            document.getElementById('modal-example-jp').innerText = 'Chưa cập nhật ví dụ.'; modalViEl.innerText = ''; modalViEl.style.display = 'none';
        }
        document.getElementById('kanji-popup').style.display = 'flex';
    }

    function closeKanjiPopup() { document.getElementById('kanji-popup').style.display = 'none'; }
</script>
